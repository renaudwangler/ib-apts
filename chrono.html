<!DOCTYPE html>
<html>
<head>
<style>
  body {background-color:black;}
  #timerCircle {margin-top:20px;position:absolute;width:90%;height:90%;top:5%;left:5%;}
  #counter {position:absolute;top:70%;left:50%;transform:translate(-50%,-50%);font-size:12vmin;font-weight:bold;color:white;background-color:black;padding:5px;border: solid 2px gray;}
  #endTime {position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:18vmin;font-weight:bold;}
  #timerText {position:absolute;top:30%;left:50%;transform:translate(-50%,-50%);font-size:12vmin;font-weight:bold;}
  .bottomButton, .bottomButtonOn {position:absolute;bottom:2px;height:20px;padding:7px;cursor:pointer;background-color:transparent;color:transparent;font-weight:bold;border-radius:5px;cursor:default;}
  .bottomButtonOn {background-color: crimson;color:white;cursor:pointer;}
  #parameters {position:absolute;border:ridge gray 6px;background-color:lightgray;margin-left:25%;margin-top:25%;width:calc(50% - 20px);top:0px;left:0px;justify-content:center;padding-left:10px;padding-right:10px;padding-bottom:20px;}
  #parameters.off {visibility:hidden;}
  #parameters.on {visibility:visible;}
  #parameters .close, #parameters .closeOn {display:flex;position:absolute;top:0px;right:0px;padding:0px;background-color:dimgray;color:white;font-weight:bold;height:30px;width:30px;align-items:center;justify-content:center;cursor:pointer;font-size:30px;}
  #parameters h1 {font-variant-caps: all-small-caps;font-size:26px;width:calc(100% + 20px);margin:0px;margin-left:-10px;text-align:center;background-color:gray;color:white;height:30px;margin-bottom:10px}
  #parameters .restart, #parameters .restartOn {float:right;display:block;padding:6px;background-color:dimgray;color:white;font-weight:bold;cursor:pointer;font-size:22px;margin-top:10px;margin-right:10px;border-radius:4px;padding-left:12px;padding-right:12px;}
  #parameters .closeOn {background-color:crimson;}
  #parameters .restartOn {background-color:greenyellow;color:darkgreen;}
  #parameters .text {width:100%;text-align:center;margin-bottom: 20px;}
</style>
<script>
  let interval;

  function startCircularTimer() {
    document.getElementById('parameters').className='off';
    document.getElementById('backCircle').style.fill='white';
    document.getElementById('counter').style.visibility='visible';
    if (document.getElementById('duree').checked==true) {
      total = parseInt(document.getElementById("dureeVal").value*60, 10);
      endTime = new Date();
      endTime.setSeconds(endTime.getSeconds()+total);}
    else {
      endTime = new Date();
      endTime.setHours(document.getElementById('heureVal').value.split(':')[0],document.getElementById('heureVal').value.split(':')[1],0);
      total=Math.abs(endTime-new Date().setSeconds(0))/1000;}
    document.getElementById('endTime').textContent=endTime.getHours()+'h'+(endTime.getMinutes()<10?'0'+endTime.getMinutes():endTime.getMinutes());
    remaining = total;
    clearInterval(interval);
    const circle = document.getElementById("progress");
    const circumference = Math.PI * circle.getBBox().width;
    circle.style.strokeDasharray = circumference;
    circle.style.strokeDashoffset = circumference;
    updateDisplay(remaining);
    interval = setInterval(tick, 1000);}

  function tick() {
    remaining--;
    updateDisplay(remaining);
    const circle = document.getElementById("progress");
    const circumference = Math.PI * circle.getBBox().width;
    const progress = (remaining / total) * circumference;
    circle.style.strokeDashoffset = progress;
    if (remaining <= 0) {
      clearInterval(interval);
      document.getElementById('backCircle').style.stroke='none';
      document.getElementById('backCircle').style.fill='LimeGreen';
      document.getElementById('counter').style.visibility='hidden';}}

  function updateDisplay(sec) {
    document.getElementById("counter").textContent = `${String(Math.floor(sec / 60)).padStart(2, "0")}:${String(sec % 60).padStart(2, "0")}`;}

</script>
</head>
<body>
<div id="timerCircle">
  <svg width="100%" height="100%" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet">
    <circle id="backCircle" cx="50" cy="50" r="42" stroke="lightgray" stroke-width="11" fill="white"/>
    <circle id="progress" cx="50" cy="50" r="42" stroke="LimeGreen" stroke-width="10" fill="none" stroke-linecap="round" transform="rotate(-90 50 50)" stroke-dasharray="565" stroke-dashoffset="565" />
  </svg>
  <div id="timerText">Reprise</div>
  <div id="endTime">00:00</div>
  <div id="counter">00:00</div>
</div>
<div id="parameters" class="off">
  <div class="close" onmouseover="this.className='closeOn';" onmouseout="this.className='close';" onclick="document.getElementById('parameters').className='off';">&times;</div>
  <h1>Paramètrage</h1>
  <div class="text">
    Afficher <input type="radio" name="text" id="debut" onclick="document.getElementById('timerText').textContent='Début';"><label for="debut">Début</label> ou <input type="radio" name="text" id="reprise" value="Reprise" checked  onclick="document.getElementById('timerText').textContent='Reprise';"><label for="reprise">Reprise</label></div>
  <table><tr><td><input type="radio" name="mode" id="duree" value="duree" checked>Choisir la durée du minuteur :</td><td><input type="number" id="dureeVal" value="10" min="1" max="120" onfocus="document.getElementById('duree').checked=true;" onkeydown="if(event.keyCode===13) startCircularTimer();"> minutes</td></tr>
  <tr><td colspan="2">OU</td></tr>
  <tr><td><input type="radio" name="mode" id="heure" value="heure">Choisir l'heure de reprise :</td><td><input type="time" id="heureVal" onfocus="document.getElementById('heure').checked=true;"></td></tr></table>
  <div class="restart" onmouseover="this.className='restartOn';" onmouseleave="this.className='restart';" onclick="startCircularTimer();">Relancer</div>
</div>
<div class="bottomButton" style="left:2px;" onmouseover="this.className='bottomButtonOn'" onmouseleave="this.className='bottomButton';" onclick="if (!document.fullscreenElement) {document.documentElement.requestFullscreen();} else {document.exitFullscreen();}">Plein écran</div>
<div class="bottomButton" style="right:2px;" onmouseover="if(document.getElementById('parameters').className=='off') this.className='bottomButtonOn';" onmouseleave="this.className='bottomButton';" onclick="if(document.getElementById('parameters').className=='off') document.getElementById('parameters').className='on';">Paramètres</div>
<script language="javascript">
  startCircularTimer()
</script>
</body>
</html>
